<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | FlipCymru</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <div class="container mt-5">
    <h2>Register</h2>
    <form id="registerForm">
      <input type="text" id="name" class="form-control mb-2" placeholder="Name" required>
      <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>
      <input type="password" id="password" class="form-control mb-2" placeholder="Password" required>
      <button class="btn btn-success">Register</button>
    </form>
    <p class="mt-3">Already have an account? <a href="index.html">Login</a></p>
  </div>
  <script src="script/auth.js"></script>
</body>
</html>
