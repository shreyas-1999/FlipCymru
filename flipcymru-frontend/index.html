<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | FlipCymru</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="script/auth.js" defer></script>
</head>
<body class="container mt-5">
  <h2>Login</h2>
  <form id="loginForm">
    <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>
    <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
    <button type="submit" class="btn btn-primary">Login</button>
  </form>
  <hr />
  <button id="googleLoginBtn" class="btn btn-danger">Sign in with Google</button>
  <p class="mt-3">No account? <a href="register.html">Register</a></p>
</body>
</html>
